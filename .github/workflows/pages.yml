name: Verify and deploy stopped Pages site

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions: {}

concurrency:
  group: atmospheric-optics-lab-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    outputs:
      source_sha: ${{ steps.source.outputs.sha }}
    steps:
      - name: Check out exact source with complete history
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Record source commit
        id: source
        run: echo "sha=$(git rev-parse HEAD)" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Verify privacy and build the minimal stop page
        env:
          PRIVACY_DENYLIST: ${{ secrets.PRIVACY_DENYLIST }}
        run: |
          python scripts/privacy_gate.py
          mkdir _site
          cp index.html _site/index.html
          cp public/robots.txt _site/robots.txt
          python scripts/build_deployment_manifest.py --root _site --source-commit "${{ steps.source.outputs.sha }}"
          test "$(find _site -type f | wc -l | tr -d ' ')" = "3"
          python scripts/privacy_gate.py --root _site --skip-history
          git diff --check

      - name: Upload exact verified Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: _site
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Configure GitHub Pages
        uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5

      - name: Deploy exact verified artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  verify-public:
    needs: [build, deploy]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
    steps:
      - name: Check out public verifier
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          ref: ${{ needs.build.outputs.source_sha }}
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.11"

      - name: Verify every deployed file and source commit
        run: |
          python scripts/verify_deployed_pages.py \
            --base-url "${{ needs.deploy.outputs.page_url }}" \
            --source-commit "${{ needs.build.outputs.source_sha }}"
