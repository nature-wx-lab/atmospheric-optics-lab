<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="robots" content="noindex, nofollow, noarchive" />
    <meta name="referrer" content="no-referrer" />
    <title>大気光学3Dラボ | 開発停止</title>
    <style>
      :root {
        color-scheme: light;
        font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
        color: #18323b;
        background: #edf6f7;
      }

      * { box-sizing: border-box; }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
      }

      main {
        width: min(680px, 100%);
        padding: clamp(28px, 6vw, 56px);
        border: 1px solid #bed5d9;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 16px 48px rgb(28 77 87 / 10%);
      }

      p { line-height: 1.8; }
      .label { color: #287783; font-weight: 700; letter-spacing: .08em; }
      h1 { margin: .35em 0 .8em; font-size: clamp(1.8rem, 6vw, 3rem); line-height: 1.25; }
      a { color: #176776; }
    </style>
  </head>
  <body>
    <main>
      <p class="label">NATURE WX LAB</p>
      <h1>大気光学3Dラボは開発を停止しました</h1>
      <p>求めていた3D教材として十分な品質に達していないため、2026年7月23日をもって開発を停止し、シミュレーターの公開を終了しました。</p>
      <p><a href="https://naturewxlab.com/" rel="noreferrer">Nature Wx Lab 公式サイトへ戻る</a></p>
    </main>
  </body>
</html>
